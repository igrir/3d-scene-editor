<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Editor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;overflow:hidden;background:#1a1a2e;color:#eee}
  #app{width:100vw;height:100dvh;overflow:hidden}
  #cv{width:100%;height:100%;position:relative;overflow:hidden}
  #cv canvas{display:block;width:100%!important;height:100%!important}

  /* Bottom panel — overlay on canvas */
  #panel{position:absolute;bottom:0;left:0;right:0;z-index:10;background:rgba(255,255,255,.45);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.2);margin:0 12px 16px;border-radius:20px;max-height:46vh;min-height:190px;display:flex;flex-direction:column}
  #panel-tabs{display:flex;gap:0;background:rgba(0,0,0,.04);flex-shrink:0}
  #panel-tabs button{flex:1;padding:10px 4px;border:none;background:transparent;color:#444;cursor:pointer;font-size:13px;text-align:center;transition:.15s;font-weight:600}
  #panel-tabs button:hover{color:#222}
  #panel-tabs button.on{color:#fff;background:rgba(22,33,62,.7)}
  #panel-content{flex:1;overflow-y:auto;padding:4px;min-height:0}

  #panel.collapsed{min-height:0!important;border:none}
  #panel.collapsed #panel-body{max-height:0;padding-top:0;padding-bottom:0;opacity:0;overflow:hidden}
  #panel-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;max-height:2000px;transition:max-height .35s ease,opacity .3s ease,padding .3s ease}
  #panel.collapsed #panel-bar{background:rgba(255,255,255,.45);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.2);border-radius:20px}
  #panel-bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:transparent;flex-shrink:0}
  #panel-bar #pnl-toggle{width:32px;height:28px;border:none;border-radius:6px;background:transparent;color:#333;cursor:pointer;font-size:12px;transition:.15s;display:flex;align-items:center;justify-content:center}
  #panel-bar #pnl-toggle:hover{background:rgba(0,0,0,.06);color:#222}
  #panel-bar .uf-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;color:#333;cursor:pointer;font-size:14px;transition:.15s;display:flex;align-items:center;justify-content:center}
  #panel-bar .uf-btn:hover:not(:disabled){background:rgba(0,0,0,.08);color:#111}
  #panel-bar .uf-btn:disabled{opacity:.3;cursor:default}
  #panel-content::-webkit-scrollbar{width:4px}
  #panel-content::-webkit-scrollbar-thumb{background:rgba(15,52,96,.6);border-radius:2px}

  /* Object grid */
  .og{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .ob{min-height:48px;padding:8px 4px;background:rgba(255,255,255,.85);border:1px solid rgba(200,200,210,.5);border-radius:10px;color:#222;cursor:pointer;font-size:13px;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ob:hover{background:rgba(233,69,96,.1);border-color:#e94560;color:#e94560}
  .ob.pending{border-color:#e94560;background:rgba(233,69,96,.08);box-shadow:0 0 8px #e9456044}
  .ob .em{font-size:20px}

  /* Color controls */
  .cr{display:flex;align-items:center;gap:10px}
  .cr input[type=color]{width:52px;height:36px;border:1px solid rgba(15,52,96,.5);border-radius:8px;padding:2px;cursor:pointer;background:transparent}
  .cr input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  .cr input[type=color]::-webkit-color-swatch{border:none;border-radius:5px}
  .cc{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .cc span{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:.12s}
  .cc span:hover{border-color:#e94560;transform:scale(1.2)}

  /* Shared */
  .si{padding:8px 10px;background:rgba(10,10,26,.5);border-radius:8px;font-size:12px;min-height:34px}
  .si .l{opacity:.6;color:#444}.si .v{color:#e94560}
  .row{display:flex;gap:6px}.row .ba{flex:1}
  .ba{min-height:42px;padding:8px 10px;border:1px solid rgba(15,52,96,.5);border-radius:8px;cursor:pointer;font-size:13px;transition:.15s;text-align:center}
  .ba:disabled{opacity:.3;cursor:default}
  .bd{background:rgba(233,69,96,.12);color:#d63031}.bd:hover:not(:disabled){background:rgba(233,69,96,.25);color:#c0392b}
  .bs{background:rgba(26,26,62,.6);color:#ccc}.bs:hover:not(:disabled){background:rgba(15,52,96,.6);color:#fff}
  .bg{display:flex;gap:5px}
  .bg .gb{flex:1;min-height:40px;padding:6px 4px;border:1px solid rgba(15,52,96,.5);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:.15s;background:rgba(26,26,62,.5);color:#999}
  .bg .gb:hover{background:rgba(15,52,96,.5);color:#fff}
  .bg .gb.on{background:#e94560;border-color:#e94560;color:#fff;font-weight:600}
  .hdr{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:4px;font-weight:600;color:#444}

  /* Floating import/export */
  #io-float{position:absolute;top:10px;right:10px;z-index:8;display:flex;gap:5px}
  #io-float button{width:38px;height:36px;border-radius:10px;border:1px solid rgba(200,200,210,.5);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#555;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
  #io-float button:hover{background:rgba(233,69,96,.1);color:#e94560}

  /* Top-left tools */
  #tl-tools{position:absolute;top:10px;left:10px;z-index:8;display:flex;flex-direction:column;gap:4px}
  #tl-tools .tl-btn{width:38px;height:36px;border-radius:10px;border:1px solid rgba(200,200,210,.5);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#555;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
  #tl-tools .tl-btn:hover{background:rgba(233,69,96,.1);color:#e94560}
  #tl-tools .tl-btn.on{background:rgba(233,69,96,.5);border-color:#e94560;color:#fff}
  #tl-tools .tl-btn.bdel{font-size:14px}

  /* Selection overlay */
  #sel-overlay{position:absolute;z-index:6;pointer-events:none;border:2px solid rgba(233,69,96,.7);background:rgba(233,69,96,.12);border-radius:2px}

  /* JSON Modal */
  #json-modal{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center}
  #json-modal.show{display:flex}
  #json-modal .box{background:rgba(22,33,62,.9);border:1px solid rgba(15,52,96,.5);border-radius:18px;padding:18px;width:min(92vw,520px);max-height:82vh;display:flex;flex-direction:column;gap:12px}
  #json-modal .box textarea{width:100%;min-height:220px;flex:1;background:rgba(10,15,40,.7);border:1px solid rgba(15,52,96,.4);border-radius:10px;color:#eee;font-family:monospace;font-size:13px;padding:12px;resize:vertical}
  #json-modal .box textarea:focus{outline:none;border-color:#3a5a8c}
  #json-modal .row{display:flex;gap:10px;justify-content:flex-end}
  #json-modal .row button{min-height:42px;padding:10px 20px;border-radius:12px;border:1px solid rgba(15,52,96,.5);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  #json-modal .btn-primary{background:#e94560;color:#fff;border-color:#e94560}
  #json-modal .btn-primary:hover{background:#ff5a75}
  #json-modal .btn-sec{background:transparent;color:#aaa}
  #json-modal .btn-sec:hover{background:rgba(255,255,255,.08);color:#eee}

  /* Info tab inputs */
  #si-editor input[type=number],#si-editor input[type=text]{min-height:38px;font-size:13px!important;border-radius:8px!important}


  @media(min-width:768px){
    #panel{max-height:38vh;min-height:190px}
    .og{grid-template-columns:1fr 1fr 1fr}
  }

  /* Hints — inside panel-bar */
  #ht{font-size:10px;color:rgba(50,50,50,.55);pointer-events:none;white-space:nowrap;font-family:system-ui,sans-serif;flex:1;text-align:center}
  #ht kbd{background:rgba(200,200,210,.3);padding:1px 5px;border-radius:4px;color:#666;font-size:9px}
  #ht.active{background:rgba(233,69,96,.2);border:1px solid #e9456044;color:#e94560}

  @media(min-width:768px){
    #panel{max-height:36vh;min-height:190px}
    .og{grid-template-columns:1fr 1fr 1fr}
  }
</style>
</head>
<body>
<div id="app">
  <div id="cv" class="">
    <div id="io-float">
      <button id="btn-export" title="Export">📤</button>
      <button id="btn-import" title="Import">📥</button>
    </div>
    <div id="tl-tools">
      <button class="tl-btn on" id="sel-default" title="Click select">👆</button>
      <button class="tl-btn" id="sel-rect" title="Rectangle select">🔲</button>
      <button class="tl-btn" id="btn-dup-tl" title="Duplicate selected">📋</button>
      <button class="tl-btn bdel" id="btn-del-tl" title="Delete selected">🗑️</button>
    </div>
    <div id="sel-overlay" style="display:none"></div>

  <!-- JSON Modal -->
  <div id="json-modal">
    <div class="box">
      <div style="font-weight:600;font-size:13px" id="modal-title">JSON</div>
      <textarea id="modal-json" spellcheck="false" wrap="off"></textarea>
      <div class="row">
        <button class="btn-sec" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-ok" style="display:none">Import</button>
      </div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-bar">
      <button id="pnl-toggle">▼</button>
      <span style="flex:1"></span>
      <button class="uf-btn" id="btn-undo" disabled>↩</button>
      <button class="uf-btn" id="btn-redo" disabled>↪</button>
    </div>
    <div id="panel-body">
    <!-- Tabs -->
    <div id="panel-tabs">
      <button class="on" data-tab="objects">📦 Objects</button>
      <button data-tab="tools">🔧 Tools</button>
      <button data-tab="color">🎨 Color</button>
      <button data-tab="info">📋 Info</button>
      <button data-tab="world">🌍 World</button>
    </div>

    <!-- Content -->
    <div id="panel-content">

      <!-- Objects tab -->
      <div class="tab-content" data-tab="objects">
        <div class="og">
          <button class="ob" data-t="box"><span class="em">📦</span><span>Box</span></button>
          <button class="ob" data-t="sphere"><span class="em">⚪</span><span>Sphere</span></button>
          <button class="ob" data-t="cylinder"><span class="em">🥫</span><span>Cyl</span></button>
          <button class="ob" data-t="cone"><span class="em">🔺</span><span>Cone</span></button>
          <button class="ob" data-t="torus"><span class="em">🍩</span><span>Torus</span></button>
          <button class="ob" data-t="plane"><span class="em">▭</span><span>Plane</span></button>
          <button class="ob" data-t="image"><span class="em">🖼️</span><span>Image</span></button>
        </div>
        <input type="file" id="image-file-input" accept="image/*" style="display:none">
      </div>

      <!-- Tools tab -->
      <div class="tab-content" data-tab="tools" style="display:none">
        <div class="hdr">Gizmo Mode</div>
        <div class="bg" style="margin-bottom:6px">
          <button class="gb on" data-mode="advanced">🎯 Advanced</button>
          <button class="gb" data-mode="simple">🔘 Simple</button>
        </div>
        <div id="xz-mode-section">
          <div class="hdr">XZ Move Mode</div>
          <div class="bg" style="margin-bottom:8px">
            <button class="gb on" data-xzmode="plane">🏔️ Plane</button>
            <button class="gb" data-xzmode="surface">🎯 Surface</button>
          </div>
        </div>
        <div class="hdr">Actions</div>
        <div class="row">
          <button class="ba bs" id="bdup">📋 Duplicate</button>
          <button class="ba bd" id="bddel">🗑️ Delete</button>
          <button class="ba bs" id="bdrst">🔄 Reset</button>
        </div>
      </div>

      <!-- Color tab -->
      <div class="tab-content" data-tab="color" style="display:none">
        <div class="cr">
          <input type="color" id="cp" value="#e94560">
          <span id="ch" style="font-size:11px;font-family:monospace;color:#333">#e94560</span>
        </div>
        <div class="cc">
          <span style="background:#e94560" data-c="#e94560"></span>
          <span style="background:#0f3460" data-c="#0f3460"></span>
          <span style="background:#16a34a" data-c="#16a34a"></span>
          <span style="background:#f59e0b" data-c="#f59e0b"></span>
          <span style="background:#8b5cf6" data-c="#8b5cf6"></span>
          <span style="background:#06b6d4" data-c="#06b6d4"></span>
          <span style="background:#f43f5e" data-c="#f43f5e"></span>
          <span style="background:#fff" data-c="#ffffff"></span>
        </div>
      </div>

      <!-- Info tab -->
      <div class="tab-content" data-tab="info" style="display:none">
        <div class="hdr">Selection <span id="sc" style="opacity:.6;color:#444">—</span></div>
        <div id="si-editor" style="display:none">
          <div style="margin-bottom:6px">
            <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Name</label>
            <input type="text" id="inp-name" style="width:100%;padding:5px 8px;background:#0a0a1a;border:1px solid #0f3460;border-radius:4px;color:#333;font-size:11px;background:#f5f5f7" target="_blank">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px">
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Pos X</label>
              <input type="number" id="inp-px" step="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Pos Y</label>
              <input type="number" id="inp-py" step="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Pos Z</label>
              <input type="number" id="inp-pz" step="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Scale X</label>
              <input type="number" id="inp-sx" step="0.01" min="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Scale Y</label>
              <input type="number" id="inp-sy" step="0.01" min="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
            <div>
              <label style="font-size:9px;opacity:.8;display:block;margin-bottom:2px;color:#333">Scale Z</label>
              <input type="number" id="inp-sz" step="0.01" min="0.01" style="width:100%;padding:5px 6px;background:#f5f5f7;border:1px solid #ddd;border-radius:4px;color:#333;font-size:11px;font-family:monospace">
            </div>
          </div>
          <div id="image-preview" style="display:none;margin-top:6px">
            <img id="img-preview" style="max-width:100%;max-height:120px;border-radius:8px;border:1px solid #0f3460;object-fit:contain;background:rgba(0,0,0,.3)">
            <label style="font-size:9px;opacity:.5;display:block;margin-top:4px;margin-bottom:2px">Image</label>
            <button class="ba bs" id="btn-change-img" style="min-height:36px;font-size:11px">🖼️ Ganti Image</button>
            <input type="file" id="img-edit-file" accept="image/*" style="display:none">
          </div>
        </div>
        <div class="si" id="si"><span class="l">Click object to select</span></div>
      </div>

      <!-- Lighting tab -->
      <div class="tab-content" data-tab="world" style="display:none">
        <div class="hdr">Grid</div>
        <div class="bg" style="margin-bottom:6px">
          <button class="gb on" id="grid-btn">🔲 Tampilkan</button>
        </div>
        <div class="hdr">Light</div>
        <div class="bg">
          <div style="flex:1;display:flex;flex-direction:column;gap:4px;margin-bottom:8px">
            <label style="font-size:9px;opacity:.7;color:#444">Sun Rotation H</label>
            <input type="range" id="light-h" min="0" max="360" value="45" style="width:100%">
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:4px;margin-bottom:8px">
            <label style="font-size:9px;opacity:.7;color:#444">Sun Rotation V</label>
            <input type="range" id="light-v" min="5" max="85" value="45" style="width:100%">
          </div>
        </div>
        <div class="cr" style="margin-bottom:4px">
          <span style="font-size:10px;opacity:.7;min-width:70px;color:#444">Sun Color</span>
          <input type="color" id="sun-color" value="#ffeedd">
        </div>
        <div class="hdr">Shadows</div>
        <div class="bg">
          <button class="gb on" id="soft-shadow-btn">☁️ Soft</button>
          <button class="gb" id="ao-btn">🌑 AO</button>
        </div>
        <div class="hdr">Environment</div>
        <div class="cr" style="margin-bottom:4px">
          <span style="font-size:10px;opacity:.7;min-width:70px;color:#444">Background</span>
          <input type="color" id="bg-color" value="#1a1a2e">
        </div>
        <div class="cr">
          <span style="font-size:10px;opacity:.7;min-width:70px;color:#444">Ambient</span>
          <input type="color" id="ambient-color" value="#404060">
        </div>
      </div>

    </div>
  </div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.157.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.157.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';

// ═══════════ SCENE ═══════════
const container = document.getElementById('cv');
const W = container.clientWidth, H = container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 100);
camera.position.set(6,5,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.minDistance = 1.5;
orbit.maxDistance = 30;
orbit.target.set(0,0.4,0);
orbit.update();

// Lights
const ambient=new THREE.AmbientLight(0x404060,0.4);scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd,3);
sun.position.set(8,12,6); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
scene.add(sun);
let sunHA=45, sunVA=45;
scene.add(new THREE.DirectionalLight(0x8888ff,0.4).position.set(-4,3,-4));
scene.add(new THREE.HemisphereLight(0x4466ff,0x443322,0.4));

// SSAO setup
const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));const ssaoPass=new SSAOPass(scene,camera,W,H);ssaoPass.kernelRadius=0.5;ssaoPass.minDistance=0.01;ssaoPass.maxDistance=0.5;ssaoPass.outputToSamples=1;ssaoPass.setSize(W,H);let ssaoEnabled=false;ssaoPass.enabled=false;composer.addPass(ssaoPass);

// Ground
const gridHelper=new THREE.GridHelper(20,20,0x5555aa,0x333366);scene.add(gridHelper);
const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.ShadowMaterial({opacity:0.25}));
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.receiveShadow = true;
shadowPlane.userData.isDropTarget = true;
scene.add(shadowPlane);

const dropTargets = [shadowPlane];
const objects = [];
const selected = new Set();
let nextColor = '#e94560';
let targetObject = null;
let multiTargets = []; // additional selected objects (excluding targetObject)
let multiInitStates = null; // {pos:[],rot:[],scl:[]} for all selected objects before drag
let gizmoMode = 'advanced'; // 'advanced' | 'simple'
let xzMode = 'plane'; // 'plane' | 'surface'
let selectMode = 'default'; // 'default' | 'rect'
let rectStart = null, rectEnd = null, rectDragging = false;

// ═══════════ HISTORY ═══════════
const history = {
  undoStack:[], redoStack:[], maxSize:60,
  execute(a){ a.do(); this.undoStack.push(a); this.redoStack=[]; if(this.undoStack.length>this.maxSize)this.undoStack.shift(); this.updateButtons(); },
  undo(){ if(!this.undoStack.length)return; cancelDropMode(); const a=this.undoStack.pop(); a.undo(); this.redoStack.push(a); refreshSelection(); this.updateButtons(); },

};

function actCreate(m){return{do(){scene.add(m);objects.push(m);dropTargets.push(m);},undo(){scene.remove(m);const i=objects.indexOf(m);if(i>=0)objects.splice(i,1);const j=dropTargets.indexOf(m);if(j>=0)dropTargets.splice(j,1);}}}

function actDuplicate(o,c){return{do(){scene.add(c);objects.push(c);dropTargets.push(c);},undo(){scene.remove(c);const i=objects.indexOf(c);if(i>=0)objects.splice(i,1);const j=dropTargets.indexOf(c);if(j>=0)dropTargets.splice(j,1);}}}
function actTransform(m,op,oq,os,np,nq,ns){return{do(){m.position.copy(np);m.quaternion.copy(nq);m.scale.copy(ns);},undo(){m.position.copy(op);m.quaternion.copy(oq);m.scale.copy(os);}}}

class AdvancedGizmo extends THREE.Group {

  buildHelpers() {

  hitTest(rc){const h=rc.intersectObjects(this.parts,false);return h.length?h[0].object:null;}
  setHover(p){
    if(this.hovered&&this.hovered!==p)this.hovered.material.opacity=({rotate:.55,scale:.85}[this.hovered.userData.action]??.9);
    this.hovered=p;
    if(p){p.material.opacity=1;renderer.domElement.style.cursor='grab';}else{renderer.domElement.style.cursor='default';}
  }
  startDrag(p,mp){
    if(!targetObject)return;
    this.dragging={part:p,axis:p.userData.axis,action:p.userData.action,mouse:mp.clone(),startPos:targetObject.position.clone(),startRot:targetObject.quaternion.clone(),startScale:targetObject.scale.clone()};
    orbit.enabled=false; renderer.domElement.style.cursor='grabbing';
    if(p.userData.action==='translate'){this.dashLine.visible=true;this.groundRing.visible=true;this.groundDot.visible=true;}
  }
  dragUpdate(mp){
    if(!this.dragging||!targetObject)return;
    const{axis,action,mouse,startPos,startRot,startScale}=this.dragging;
    const ai={x:0,y:1,z:2}[axis], av=new THREE.Vector3(ai===0?1:0,ai===1?1:0,ai===2?1:0);
    const cd=new THREE.Vector3();camera.getWorldDirection(cd);

    if(!sp||!cp)return;

    if(action==='translate'){const transAxis=new THREE.Vector3(ai===0?1:0,ai===1?1:0,ai===2?1:0).applyQuaternion(this.quaternion);targetObject.position.copy(startPos.clone().add(transAxis.clone().multiplyScalar(d.dot(transAxis))));const y=targetObject.position.y;this.groundRing.position.set(0,-y+.02,0);this.groundDot.position.set(0,-y+.02,0);const pos=this.dashLine.geometry.attributes.position.array;pos[1]=0;pos[4]=-y;this.dashLine.geometry.attributes.position.needsUpdate=true;this.dashLine.computeLineDistances();}

        const apl=new THREE.Plane().setFromNormalAndCoplanarPoint(wAxis,targetObject.position);
        const sv=new THREE.Vector3();rc.setFromCamera(mouse,camera);rc.ray.intersectPlane(apl,sv);

  detach(){targetObject=null;this.visible=false;this.endDrag();}

// ═══════════ SIMPLE GIZMO ═══════════
class SimpleGizmo extends THREE.Group {
  constructor() {
    super();
    this.parts = [];
    this.hovered = null;
    this.dragging = null;
    this.build();
  }
  build() {
    const M = (c,o) => new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,depthTest:false,depthWrite:false});
    const ax = ['x','y','z'];
    const cols = [0xff6666, 0x66ff66, 0x6688ff];

    // ── XZ ground plane (flat rectangle frame) ──
    const groundMat = new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:.08,depthWrite:false,side:THREE.DoubleSide});
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.2,1.2), groundMat);
    groundPlane.rotation.x = -Math.PI/2;
    groundPlane.position.y = -0.01;
    groundPlane.userData = {action:'xz',gizmo:this};
    this.add(groundPlane);
    this.parts.push(groundPlane);

    // Ground plane border
    const borderMat = new THREE.LineBasicMaterial({color:0x4488ff,transparent:true,opacity:.25});
    const borderPts = [new THREE.Vector3(-.6,0,-.6),new THREE.Vector3(.6,0,-.6),new THREE.Vector3(.6,0,.6),new THREE.Vector3(-.6,0,.6),new THREE.Vector3(-.6,0,-.6)];
    const border = new THREE.Line(new THREE.BufferGeometry().setFromPoints(borderPts), borderMat);
    border.position.y = -0.01;
    this.add(border);

    // Small X and Z arrows on ground (flat)
    const gX = new THREE.Mesh(new THREE.ConeGeometry(.06,.15,6),M(0xff6666,.6));
    gX.rotation.z = -Math.PI/2; gX.position.set(.45,0,0); gX.userData={action:'xz',gizmo:this};
    this.add(gX); this.parts.push(gX);
    const gZ = new THREE.Mesh(new THREE.ConeGeometry(.06,.15,6),M(0x6688ff,.6));
    gZ.rotation.x = Math.PI/2; gZ.position.set(0,0,.45); gZ.userData={action:'xz',gizmo:this};
    this.add(gZ); this.parts.push(gZ);

    // ── Y arrow ──

    yShaft.position.set(0,.525,0); yShaft.userData={action:'y',gizmo:this};
    this.add(yShaft); this.parts.push(yShaft);

    yTip.position.set(0,.95,0); yTip.userData={action:'y',gizmo:this};

    const yRing = new THREE.Mesh(new THREE.TorusGeometry(.55,.025,16,32),M(0x66ff66,.45));
    yRing.rotation.x = Math.PI/2; yRing.position.y = .1;
    yRing.userData = {action:'rotateY',gizmo:this};
    this.add(yRing); this.parts.push(yRing);

    // ── Uniform scale handle (diamond) ──
    const sc = new THREE.Mesh(new THREE.OctahedronGeometry(.09,0),M(0xffffff,.85));
    sc.position.y = .02;
    sc.userData = {action:'scale',gizmo:this};
    this.add(sc); this.parts.push(sc);

    // Center dot
    this.add(new THREE.Mesh(new THREE.SphereGeometry(.04,8,8),M(0xffffff,.35)));

    // Drop shadow helpers
    const LM=new THREE.LineDashedMaterial({color:0x88aaff,dashSize:.06,gapSize:.06,transparent:true,opacity:.5,depthWrite:false});
    const LG=new THREE.BufferGeometry();LG.setAttribute('position',new THREE.Float32BufferAttribute([0,0,0,0,-5,0],3));
    this.dashLine=new THREE.Line(LG,LM);this.dashLine.computeLineDistances();this.dashLine.visible=false;this.add(this.dashLine);
    this.groundRing=new THREE.Mesh(new THREE.RingGeometry(.18,.5,32),new THREE.MeshBasicMaterial({color:0x88aaff,transparent:true,opacity:.1,depthWrite:false}));
    this.groundRing.rotation.x=-Math.PI/2;this.groundRing.visible=false;this.add(this.groundRing);
    this.groundDot=new THREE.Mesh(new THREE.CircleGeometry(.07,16),new THREE.MeshBasicMaterial({color:0x88aaff,transparent:true,opacity:.25,depthWrite:false}));

  }

  hitTest(rc){const h=rc.intersectObjects(this.parts,false);return h.length?h[0].object:null;}

  setHover(p){
    if(this.hovered&&this.hovered!==p)this.hovered.material.opacity=({y:.85,rotateY:.45,scale:.85,xz:.08}[this.hovered.userData.action]??.85);
    this.hovered=p;
    if(p){p.material.opacity=({xz:.2}[p.userData.action]??1);renderer.domElement.style.cursor='grab';}else{renderer.domElement.style.cursor='default';}
  }

  startDrag(p,mp){
    if(!targetObject)return;
    const act=p.userData.action;
    const drag={part:p,action:act,mouse:mp.clone(),startPos:targetObject.position.clone(),startRot:targetObject.quaternion.clone(),startScale:targetObject.scale.clone()};
    // Pre-compute initial hit point on horizontal plane for XZ draggin
    if(act==='xz'||act==='y'){
      const gizmoUp2=new THREE.Vector3(0,1,0).applyQuaternion(this.quaternion);
      const rc=new THREE.Raycaster();
      const hPlane2=new THREE.Plane().setFromNormalAndCoplanarPoint(gizmoUp2,targetObject.position);
      rc.setFromCamera(mp,camera);const hp2=new THREE.Vector3();rc.ray.intersectPlane(hPlane2,hp2);
      drag.startHit=hp2;
      this.dashLine.visible=true;this.groundRing.visible=true;this.groundDot.visible=true;
    }
    this.dragging=drag;
    orbit.enabled=false; renderer.domElement.style.cursor='grabbing';
  }

  dragUpdate(mp){
    if(!this.dragging||!targetObject)return;
    const{action,mouse,startPos,startRot,startScale}=this.dragging;
    const ai={x:0,y:1,z:2};

    const cd=new THREE.Vector3();camera.getWorldDirection(cd);
    const pl=new THREE.Plane().setFromNormalAndCoplanarPoint(cd,targetObject.position);
    const rc=new THREE.Raycaster();
    const sp=new THREE.Vector3();rc.setFromCamera(mouse,camera);rc.ray.intersectPlane(pl,sp);
    const cp=new THREE.Vector3();rc.setFromCamera(mp,camera);rc.ray.intersectPlane(pl,cp);
    if(!sp||!cp)return;
    const d=cp.clone().sub(sp);

    if(action==='xz'){
      if (xzMode === 'surface') {
        // Raycast against dropTargets (exclude self)
        const hitPoint = new THREE.Vector3();
        rc.setFromCamera(mp,camera);
        const targets = dropTargets.filter(t => !selected.has(t));
        const hits = rc.intersectObjects(targets, false);
        if (hits.length > 0) {
          const hit = hits[0];
          const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
          const offset = targetObject ? halfHeight(targetObject.userData.type) : 0.5;
          hitPoint.copy(hit.point.clone().add(normal.clone().multiplyScalar(offset)));
          targetObject.position.x = hitPoint.x;
          targetObject.position.z = hitPoint.z;
          targetObject.position.y = hitPoint.y;
          // Align rotation to surface — stay upright on ground, follow normal on other objects
          if (hit.object !== shadowPlane) {
            if (Math.abs(normal.y) < 0.99) {
              targetObject.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), normal));
            }
          } else {
            // Reset to upright on ground plane
            targetObject.quaternion.identity();
          }
        }
      } else {
        // Plane mode: delta on gizmo-local horizontal plane
        const gizmoUp=new THREE.Vector3(0,1,0).applyQuaternion(this.quaternion);
        const hPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(gizmoUp, targetObject.position);
        const hp = new THREE.Vector3();
        rc.setFromCamera(mp,camera);
        rc.ray.intersectPlane(hPlane, hp);
        if (hp && this.dragging.startHit) {
          const dPos=hp.sub(this.dragging.startHit);
          // Decompose delta into gizmo local X/Z
          const gizmoX=new THREE.Vector3(1,0,0).applyQuaternion(this.quaternion);
          const gizmoZ=new THREE.Vector3(0,0,1).applyQuaternion(this.quaternion);
          const dx=dPos.dot(gizmoX);
          const dz=dPos.dot(gizmoZ);
          targetObject.position.copy(startPos.clone().add(gizmoX.clone().multiplyScalar(dx)).add(gizmoZ.clone().multiplyScalar(dz)));
        }
      }
      const y=targetObject.position.y;
      this.groundRing.position.set(0,-y+.02,0);
      this.groundDot.position.set(0,-y+.02,0);
      const pos=this.dashLine.geometry.attributes.position.array;pos[1]=0;pos[4]=-y;
      this.dashLine.geometry.attributes.position.needsUpdate=true;this.dashLine.computeLineDistances();
    }
    else if(action==='y'){
      targetObject.position.y = startPos.y + d.y;
      const y=targetObject.position.y;
      this.groundRing.position.set(0,-y+.02,0);
      this.groundDot.position.set(0,-y+.02,0);
      const pos=this.dashLine.geometry.attributes.position.array;pos[1]=0;pos[4]=-y;
      this.dashLine.geometry.attributes.position.needsUpdate=true;this.dashLine.computeLineDistances();
    }
    else if(action==='rotateY'){
      // Rotate around Y
      const yAxis = new THREE.Vector3(0,1,0);
      const apl=new THREE.Plane().setFromNormalAndCoplanarPoint(yAxis,targetObject.position);
      const sv=new THREE.Vector3();rc.setFromCamera(mouse,camera);rc.ray.intersectPlane(apl,sv);
      const cv=new THREE.Vector3();rc.setFromCamera(mp,camera);rc.ray.intersectPlane(apl,cv);
      if(sv&&cv){
        const ds=sv.sub(targetObject.position).normalize();
        const dc=cv.sub(targetObject.position).normalize();
        if(ds.length()>.01&&dc.length()>.01){
          const ang=Math.atan2(ds.clone().cross(dc).dot(yAxis),ds.dot(dc));
          targetObject.quaternion.copy(startRot.clone().premultiply(new THREE.Quaternion().setFromAxisAngle(yAxis,ang)));
        }
      }
    }
    else if(action==='scale'){
      const localUp=new THREE.Vector3(0,1,0).applyQuaternion(this.quaternion);
      const dy = d.dot(localUp);
      const factor = 1 + dy * 1.5;
      const s = Math.max(0.1, startScale.x * factor);
      const os = startScale.x;
      targetObject.scale.set(s,s,s);
      // Offset so bottom stays anchored
      const up=new THREE.Vector3(0,1,0).applyQuaternion(targetObject.quaternion);targetObject.position.copy(startPos.clone().add(up.clone().multiplyScalar((s - os) * 0.5)));
    }
    this.position.copy(targetObject.position);
  }

  endDrag(){
    this.dashLine.visible=false;this.groundRing.visible=false;this.groundDot.visible=false;
    if(!this.dragging)return null;
    const r={startPos:this.dragging.startPos,startRot:this.dragging.startRot,startScale:this.dragging.startScale,endPos:targetObject.position.clone(),endRot:targetObject.quaternion.clone(),endScale:targetObject.scale.clone(),action:this.dragging.action};
    this.dragging=null; orbit.enabled=true; renderer.domElement.style.cursor='default'; return r;
  }

  attach(obj){targetObject=obj;this.position.copy(obj.position);this.quaternion.copy(obj.quaternion);this.visible=true;}
  detach(){targetObject=null;this.visible=false;this.endDrag();}
}

function getActiveGizmo() { return gizmoMode === 'advanced' ? advGizmo : simGizmo; }
function attachGizmo(obj,multi) {
  advGizmo.detach(); simGizmo.detach();
  const g=getActiveGizmo();g.attach(obj);
  if(multi&&multi.length>0){
    // Position gizmo at center of all selected, world-aligned
    const c=new THREE.Vector3();let n=1;
    c.copy(obj.position);
    for(const m of multi){c.add(m.position);n++;}
    c.divideScalar(n);
    g.position.copy(c);
    g.quaternion.identity();
  }
}
function detachGizmo() { advGizmo.detach(); simGizmo.detach(); }
function gizmoHitTest(rc) { return getActiveGizmo().hitTest(rc); }
function gizmoStartDrag(p, mp) {
  if(selected.size>1){
    multiInitStates={pos:[],rot:[],scl:[]};
    for(const m of selected){
      multiInitStates.pos.push(m.position.clone());
      multiInitStates.rot.push(m.quaternion.clone());
      multiInitStates.scl.push(m.scale.clone());
    }
  } else {
    multiInitStates=null;
  }
  getActiveGizmo().startDrag(p, mp);
}
function gizmoDragUpdate(mp) {
  if(selected.size>1&&targetObject&&multiInitStates){
    const g=getActiveGizmo();
    const isRot=g.dragging&&(g.dragging.action==='rotate'||g.dragging.action==='rotateY');
    if(isRot){
      // Group rotation: compute directly using gizmo axis & initial mouse
      const axis=g.dragging.axis||'y';
      const localAxis=new THREE.Vector3(axis==='x'?1:0,axis==='y'?1:0,axis==='z'?1:0);
      const wAxis=localAxis.clone().applyQuaternion(g.quaternion);
      // Compute initial group center from multiInitStates
      const center=new THREE.Vector3();
      for(let i=0;i<selected.size;i++)center.add(multiInitStates.pos[i]);
      center.divideScalar(selected.size);
      // Compute angle: project mouse onto rotation plane through center
      const plane=new THREE.Plane().setFromNormalAndCoplanarPoint(wAxis,center);
      const rc=new THREE.Raycaster();
      const sp=new THREE.Vector3();rc.setFromCamera(g.dragging.mouse,camera);rc.ray.intersectPlane(plane,sp);
      const cp=new THREE.Vector3();rc.setFromCamera(mp,camera);rc.ray.intersectPlane(plane,cp);
      if(sp&&cp){
        const ds=sp.sub(center).normalize();const dc=cp.sub(center).normalize();
        if(ds.length()>.01&&dc.length()>.01){
          const ang=Math.atan2(wAxis.dot(ds.clone().cross(dc)),ds.dot(dc));
          const dRot=new THREE.Quaternion().setFromAxisAngle(wAxis,ang);
          // Group rotation: orbit positions + rotate each object by group delta
          let idx=0;
          for(const m of selected){
            const initPos=multiInitStates.pos[idx];
            const initQuat=multiInitStates.rot[idx];
            const offset=initPos.clone().sub(center);
            const newOffset=offset.clone().applyQuaternion(dRot);
            m.position.copy(center.clone().add(newOffset));
            m.quaternion.copy(dRot.clone().multiply(initQuat));
            idx++;
          }
        }
      }
      // Update gizmo to stay at center (quaternion stays as attached, not updated)
      const c=new THREE.Vector3();
      for(const om of selected)c.add(om.position);
      c.divideScalar(selected.size);
      g.position.copy(c);
    }else if(g.dragging&&g.dragging.action==='scale'){
      // Scale: extract per-axis factor, apply to all without position anchoring
      const prevScl=targetObject.scale.clone();
      g.dragUpdate(mp);
      // Revert targetObject position (undo anchoring adjustment applied by gizmo)
      targetObject.position.copy(g.dragging.startPos);
      const dScl=new THREE.Vector3(prevScl.x>0?targetObject.scale.x/prevScl.x:1,prevScl.y>0?targetObject.scale.y/prevScl.y:1,prevScl.z>0?targetObject.scale.z/prevScl.z:1);
      for(const m of selected){
        if(m===targetObject)continue;
        m.scale.multiply(dScl);
      }
      const c=new THREE.Vector3();
      for(const om of selected)c.add(om.position);
      c.divideScalar(selected.size);
      g.position.copy(c);g.quaternion.copy(targetObject.quaternion);
    }else{
      // Translation: use gizmo dragUpdate + sync delta (no rotation changes!)
      const prevPos=targetObject.position.clone();
      g.dragUpdate(mp);
      const dPos=targetObject.position.clone().sub(prevPos);
      for(const m of selected){
        if(m===targetObject)continue;
        m.position.add(dPos);
      }
      const c=new THREE.Vector3();
      for(const om of selected)c.add(om.position);
      c.divideScalar(selected.size);
      g.position.copy(c);
    }
  } else {
    getActiveGizmo().dragUpdate(mp);
    const g=getActiveGizmo();
    if(g.visible&&targetObject)g.quaternion.copy(targetObject.quaternion);
  }
}
function gizmoEndDrag() {
  const g = getActiveGizmo();
  const r = g.endDrag();
  if (r && targetObject) {
    const moved = !r.startPos.equals(r.endPos) || !r.startRot.equals(r.endRot) || !r.startScale.equals(r.endScale);
    if (moved) {
      if(selected.size>1&&multiInitStates){
        const allM=[...selected];
        const st={pos:[],rot:[],scl:[]},en={pos:[],rot:[],scl:[]};
        for(let i=0;i<allM.length;i++){
          st.pos.push(multiInitStates.pos[i]);st.rot.push(multiInitStates.rot[i]);st.scl.push(multiInitStates.scl[i]);
          en.pos.push(allM[i].position.clone());en.rot.push(allM[i].quaternion.clone());en.scl.push(allM[i].scale.clone());
        }
        history.execute({do(){for(let i=0;i<allM.length;i++){allM[i].position.copy(en.pos[i]);allM[i].quaternion.copy(en.rot[i]);allM[i].scale.copy(en.scl[i]);}},undo(){for(let i=0;i<allM.length;i++){allM[i].position.copy(st.pos[i]);allM[i].quaternion.copy(st.rot[i]);allM[i].scale.copy(st.scl[i]);}}});
        multiInitStates=null;
      } else if (r.action === 'scale') {
        history.execute(actUniformScale(targetObject, r.startScale, r.endScale));
      } else {
        history.execute(actTransform(targetObject, r.startPos, r.startRot, r.startScale, r.endPos, r.endRot, r.endScale));
      }
    }
  }
  multiInitStates=null;
  refreshPanel();
  return r;
}

// ═══════════ POINTER ═══════════
const raycaster = new THREE.Raycaster();
function getPtr(e){const r=renderer.domElement.getBoundingClientRect();return new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1);}
function hitObjs(e){const p=getPtr(e);raycaster.setFromCamera(p,camera);return raycaster.intersectObjects(objects);}
let gizmoDragging=false;

renderer.domElement.addEventListener('pointerdown',e=>{
  if(e.button!==0)return;
  if(dropMode){if(dropMode.ghost.visible)placeGhost();return;}
  const p=getPtr(e);
  if(selectMode==='rect'){
    orbit.enabled=false;
    const r=renderer.domElement.getBoundingClientRect();
    rectStart={x:e.clientX-r.left,y:e.clientY-r.top};rectEnd=null;rectDragging=true;
    const ov=document.getElementById('sel-overlay');ov.style.display='';ov.style.left=rectStart.x+'px';ov.style.top=rectStart.y+'px';ov.style.width='0px';ov.style.height='0px';
    return;
  }
  const g=getActiveGizmo();
  if(g.visible&&targetObject){raycaster.setFromCamera(p,camera);const gh=g.hitTest(raycaster);if(gh){gizmoStartDrag(gh,p);gizmoDragging=true;return;}}
  const hits=hitObjs(e);
  if(hits.length>0){const obj=hits[0].object;if(e.ctrlKey||e.metaKey){if(selected.has(obj))selected.delete(obj);else selected.add(obj);}else{selected.clear();selected.add(obj);}}else{if(!e.ctrlKey&&!e.metaKey)selected.clear();}
  refreshSelection();
});

renderer.domElement.addEventListener('pointermove',e=>{
  if(dropMode){updateGhost(e);return;}
  const p=getPtr(e);
  if(gizmoDragging){gizmoDragUpdate(p);refreshPanel();return;}
  if(rectDragging&&rectStart){
    const r=renderer.domElement.getBoundingClientRect();
    rectEnd={x:e.clientX-r.left,y:e.clientY-r.top};
    const ov=document.getElementById('sel-overlay');
    const x=Math.min(rectStart.x,rectEnd.x),y=Math.min(rectStart.y,rectEnd.y);
    const w=Math.abs(rectEnd.x-rectStart.x),h=Math.abs(rectEnd.y-rectStart.y);
    ov.style.left=x+'px';ov.style.top=y+'px';ov.style.width=w+'px';ov.style.height=h+'px';
    return;
  }
  const g=getActiveGizmo();
  if(g.visible&&targetObject){raycaster.setFromCamera(p,camera);gizmoSetHover(g.hitTest(raycaster));}else{gizmoSetHover(null);}
});

renderer.domElement.addEventListener('pointerup',e=>{
  if(gizmoDragging){gizmoEndDrag();gizmoDragging=false;}
  if(rectDragging){
    rectDragging=false;orbit.enabled=true;
    const ov=document.getElementById('sel-overlay');ov.style.display='none';
    if(!rectStart||!rectEnd)return;
    const minX=Math.min(rectStart.x,rectEnd.x),maxX=Math.max(rectStart.x,rectEnd.x);
    const minY=Math.min(rectStart.y,rectEnd.y),maxY=Math.max(rectStart.y,rectEnd.y);
    const r=renderer.domElement.getBoundingClientRect();
    const left=((minX)/r.width)*2-1,right=((maxX)/r.width)*2-1;
    const bottom=-(((maxY)/r.height)*2-1),top=-(((minY)/r.height)*2-1);
    const sel=[];
    for(const m of objects){
      const vec=m.position.clone().project(camera);
      if(vec.x>=left&&vec.x<=right&&vec.y>=bottom&&vec.y<=top)sel.push(m);
    }
    selected.clear();sel.forEach(m=>selected.add(m));
    rectStart=rectEnd=null;
    // Auto switch back to default mode
    selectMode='default';
    document.querySelectorAll('#tl-tools .tl-btn').forEach(b=>b.classList.remove('on'));
    document.getElementById('sel-default').classList.add('on');
    refreshSelection();
  }
});

renderer.domElement.addEventListener('pointerleave',()=>{
  if(gizmoDragging){gizmoEndDrag();gizmoDragging=false;}
  if(rectDragging){rectDragging=false;orbit.enabled=true;document.getElementById('sel-overlay').style.display='none';rectStart=rectEnd=null;}
  gizmoSetHover(null);
});

renderer.domElement.addEventListener('dblclick',e=>{
  const hits=hitObjs(e);
  if(hits.length>0){const p=new THREE.Vector3();hits[0].object.getWorldPosition(p);orbit.target.copy(p);}
});

// Keyboard
document.addEventListener('keydown',e=>{
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();history.undo();return;}
  if(mod&&e.key==='y'){e.preventDefault();history.redo();return;}
  if((e.key==='Delete'||e.key==='Backspace')&&selected.size>0){if(dropMode)cancelDropMode();e.preventDefault();history.execute(actDelete([...selected]));selected.clear();detachGizmo();refreshSelection();return;}
  if(e.key==='Escape'){if(dropMode){cancelDropMode();return;}if(rectDragging||selectMode==='rect'){rectDragging=false;rectStart=rectEnd=null;document.getElementById('sel-overlay').style.display='none';selectMode='default';document.querySelectorAll('#tl-tools .tl-btn').forEach(b=>b.classList.remove('on'));document.getElementById('sel-default').classList.add('on');return;}selected.clear();detachGizmo();refreshSelection();}
});

function doHighlight(){unhighlight();selected.forEach(m=>{m.material.emissive=new THREE.Color(0x4466ff);m.material.emissiveIntensity=.15;});}
function refreshSelection(){

function refreshPanel(){

    si.innerHTML='<span class="l">Click object to select</span>'; sc.textContent='—'; editingObject=null;

// Editable fields — capture old state on focus, apply + undo on change
let focusSnapshot = null;
document.querySelectorAll('#si-editor input').forEach(inp => {
  inp.addEventListener('focus', () => {
    if (editingObject) {
      focusSnapshot = {
        pos: editingObject.position.clone(),
        scl: editingObject.scale.clone(),
        name: editingObject.userData.type,
      };
    }
  });
  inp.addEventListener('change', () => {
    if (!editingObject || !focusSnapshot) return;
    const m = editingObject;
    const newPos = new THREE.Vector3(
      parseFloat(document.getElementById('inp-px').value) || 0,
      parseFloat(document.getElementById('inp-py').value) || 0,
      parseFloat(document.getElementById('inp-pz').value) || 0
    );
    const newScl = new THREE.Vector3(
      Math.max(0.01, parseFloat(document.getElementById('inp-sx').value) || 0.01),
      Math.max(0.01, parseFloat(document.getElementById('inp-sy').value) || 0.01),
      Math.max(0.01, parseFloat(document.getElementById('inp-sz').value) || 0.01)
    );
    const newName = document.getElementById('inp-name').value.trim() || m.userData.type;

    const oldPos = focusSnapshot.pos;
    const oldScl = focusSnapshot.scl;
    const oldName = focusSnapshot.name;

    m.userData.type = newName;
    m.position.copy(newPos);
    m.scale.copy(newScl);

    // Apply to all selected objects
    if(selected.size>1&&editingObject){
      const dPos=newPos.clone().sub(oldPos);
      const dScl=new THREE.Vector3(
        oldScl.x>0?newScl.x/oldScl.x:1,
        oldScl.y>0?newScl.y/oldScl.y:1,
        oldScl.z>0?newScl.z/oldScl.z:1
      );
      for(const om of selected){if(om===editingObject)continue;
        om.position.add(dPos);
        om.scale.multiply(dScl);
      }
    }

    history.execute({
      do() {
        m.userData.type = newName;
        m.position.copy(newPos);
        m.scale.copy(newScl);
        if(multiTargets.length){
          const dp=newPos.clone().sub(oldPos);
          const ds=new THREE.Vector3(oldScl.x>0?newScl.x/oldScl.x:1,oldScl.y>0?newScl.y/oldScl.y:1,oldScl.z>0?newScl.z/oldScl.z:1);
          for(const om of selected){if(om===editingObject)continue;om.position.add(dp);om.scale.multiply(ds);}
        }
      },
      undo() {
        m.userData.type = oldName;
        m.position.copy(oldPos);
        m.scale.copy(oldScl);
        if(multiTargets.length){
          const dp=oldPos.clone().sub(newPos);
          const ds=new THREE.Vector3(newScl.x>0?oldScl.x/newScl.x:1,newScl.y>0?oldScl.y/newScl.y:1,newScl.z>0?oldScl.z/newScl.z:1);
          for(const om of selected){if(om===editingObject)continue;om.position.add(dp);om.scale.multiply(ds);}
        }
      },
    });

    populateEditor(m);
    focusSnapshot = { pos: newPos.clone(), scl: newScl.clone(), name: newName };
  });
});

// Drag scrubber for number inputs — click & drag left/right to change value
let scrubState = null;
document.querySelectorAll('#si-editor input[type="number"]').forEach(inp => {
  inp.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    const val = parseFloat(inp.value) || 0;
    scrubState = { inp, startX: e.clientX, startVal: val, step: parseFloat(inp.step) || 0.01, scrubbing: false };
    // Capture undo snapshot
    if (editingObject) {
      focusSnapshot = {
        pos: editingObject.position.clone(),
        scl: editingObject.scale.clone(),
        name: editingObject.userData.type,
      };
    }
  });
  inp.addEventListener('pointermove', e => {
    if (!scrubState || scrubState.inp !== inp) return;
    const dx = e.clientX - scrubState.startX;
    // Start scrubbing if moved more than 4px
    if (!scrubState.scrubbing && Math.abs(dx) > 4) {
      scrubState.scrubbing = true;
      inp.setPointerCapture(e.pointerId);
      inp.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
    }
    if (!scrubState.scrubbing) return;
    e.preventDefault();
    const newVal = Math.round((scrubState.startVal + dx * scrubState.step * 0.5) / scrubState.step) * scrubState.step;
    inp.value = (inp.hasAttribute('min') ? Math.max(parseFloat(inp.min), newVal) : newVal).toFixed(2);
    if (editingObject) {
      const m = editingObject;
      m.position.set(
        parseFloat(document.getElementById('inp-px').value) || 0,
        parseFloat(document.getElementById('inp-py').value) || 0,
        parseFloat(document.getElementById('inp-pz').value) || 0
      );
      m.scale.set(
        Math.max(0.01, parseFloat(document.getElementById('inp-sx').value) || 0.01),
        Math.max(0.01, parseFloat(document.getElementById('inp-sy').value) || 0.01),
        Math.max(0.01, parseFloat(document.getElementById('inp-sz').value) || 0.01)
      );
      const g = getActiveGizmo();
      if (g.visible && targetObject) {
        if(selected.size>1){
          // Center gizmo on all selected
          const c=new THREE.Vector3();let n=0;
          for(const om of selected){c.add(om.position);n++;}
          c.divideScalar(n);g.position.copy(c);
        } else {
          g.position.copy(targetObject.position);
        }
      }
    }
  });
  inp.addEventListener('pointerup', e => {
    if (!scrubState || scrubState.inp !== inp) return;
    if (scrubState.scrubbing) {
      inp.releasePointerCapture(e.pointerId);
      inp.dispatchEvent(new Event('change')); // save undo
    }
    inp.style.cursor = '';
    document.body.style.userSelect = '';
    scrubState = null;
  });
  inp.addEventListener('pointercancel', e => {
    if (!scrubState || scrubState.inp !== inp) return;
    if (scrubState.scrubbing) inp.releasePointerCapture(e.pointerId);
    inp.style.cursor = '';
    document.body.style.userSelect = '';
    scrubState = null;
  });
});

function makePlaceholderTex(){
  const c=document.createElement('canvas');c.width=256;c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#2a2a4a';ctx.fillRect(0,0,256,256);
  for(let i=0;i<256;i+=32){ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,256);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(256,i);ctx.stroke();}
  ctx.fillStyle='#888';ctx.font='bold 48px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🖼️',128,128);
  ctx.font='14px system-ui';ctx.fillStyle='#666';ctx.fillText('Image',128,190);
  const tx=new THREE.CanvasTexture(c);tx.colorSpace='srgb';
  return tx;
}
function createObj(t,imgSrc){const geo=getGeom(t);let mat,m;
if(t==='image'){
  const src=imgSrc||'';
  if(src){
    const tx=new THREE.TextureLoader().load(src);tx.colorSpace='srgb';
    mat=new THREE.MeshStandardMaterial({map:tx,transparent:true,roughness:.5,metalness:0,side:THREE.DoubleSide});
    const img=new Image();img.onload=()=>{const a=img.width/img.height;geo.scale(1,a,1);};img.src=src;
  }else{
    mat=new THREE.MeshStandardMaterial({map:makePlaceholderTex(),transparent:true,roughness:.5,metalness:0,side:THREE.DoubleSide});
  }
  m=new THREE.Mesh(geo,mat);m.castShadow=false;m.receiveShadow=false;
}else{
  mat=new THREE.MeshStandardMaterial({color:new THREE.Color(nextColor),roughness:.3,metalness:.05});
  m=new THREE.Mesh(geo,mat);m.castShadow=true;m.receiveShadow=true;
}
m.userData.type=t;m.userData.isDropTarget=true;if(imgSrc)m.userData.imageSrc=imgSrc;return m;}
function delSel(){if(!selected.size)return;history.execute(actDelete([...selected]));selected.clear();detachGizmo();refreshSelection();}
function dupSel(){if(!selected.size)return;const clones=[];for(const m of selected){const c=new THREE.Mesh(m.geometry.clone(),m.material.clone());c.position.copy(m.position);c.position.x+=.6;c.quaternion.copy(m.quaternion);c.scale.copy(m.scale);c.castShadow=true;c.receiveShadow=m.receiveShadow;c.userData.type=m.userData.type;c.userData.isDropTarget=true;c.userData.imageSrc=m.userData.imageSrc;scene.add(c);objects.push(c);dropTargets.push(c);clones.push(c);history.execute(actDuplicate(m,c));}selected.clear();clones.forEach(c=>selected.add(c));refreshSelection();}

const modalJson=document.getElementById('modal-json');
const modalOk=document.getElementById('modal-ok');
function showModal(title,json,okText,okCb){modalTitle.textContent=title;modalJson.value=json;modalOk.textContent=okText;modalOk.style.display=okCb?'':'none';modalOk.onclick=()=>{try{okCb(modalJson.value);hideModal()}catch(e){alert('Error: '+e.message)}};modal.classList.add('show');modalJson.focus();modalJson.select();}
function hideModal(){modal.classList.remove('show');}
document.getElementById('modal-cancel').addEventListener('click',hideModal);
modal.addEventListener('click',e=>{if(e.target===modal)hideModal()});

// Export
document.getElementById('btn-export').addEventListener('click',()=>{
  const data = objects.map(m => {
    const d = {
      type: m.userData.type,
      pos: m.position.toArray(),
      rot: [m.quaternion.x, m.quaternion.y, m.quaternion.z, m.quaternion.w],
      scl: m.scale.toArray()
    };
    if(m.userData.type==='image'&&m.userData.imageSrc){
      d.color='#ffffff';d.img=m.userData.imageSrc;
    }else{
      d.color='#'+m.material.color.getHexString();
    }
    return d;
  });
  showModal('📤 Export Scene',JSON.stringify(data,null,2),'Copy & Close',()=>navigator.clipboard.writeText(JSON.stringify(data)));
});

// Import
document.getElementById('btn-import').addEventListener('click',()=>{
  showModal('📥 Import Scene','[{\n  "type": "box",\n  "pos": [0,0.5,0],\n  "rot": [0,0,0,1],\n  "scl": [1,1,1],\n  "color": "#e94560"\n}]','Import',json=>{
    const data=JSON.parse(json);
    if(!Array.isArray(data))throw new Error('Must be an array');
    for(const entry of data){
      if(!entry.type)continue;
      const saved=nextColor;
      if(entry.color&&entry.type!=='image')nextColor=parseInt(entry.color.replace('#',''),16);
      const m=createObj(entry.type,entry.img||null);
      nextColor=saved;
      if(entry.pos)m.position.fromArray(entry.pos);
      if(entry.rot)m.quaternion.set(entry.rot[0],entry.rot[1],entry.rot[2],entry.rot[3]);
      if(entry.scl)m.scale.fromArray(entry.scl);
      history.execute(actCreate(m));
    }
    selected.clear();detachGizmo();refreshSelection();
  });
});

// Gizmo mode toggle — show XZ section only in Simple mode
function updateXZSection(){document.getElementById('xz-mode-section').style.display=gizmoMode==='simple'?'':'none';}
document.querySelectorAll('.gb[data-mode]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.gb[data-mode]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    gizmoMode = b.dataset.mode;
    updateXZSection();
    if (selected.size === 1) {
      detachGizmo();
      attachGizmo([...selected][0]);
    }
  });
});
updateXZSection(); // initial state

// XZ Move mode toggle
document.querySelectorAll('[data-xzmode]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-xzmode]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    xzMode = b.dataset.xzmode;
  });
});

// Panel toggle (inside Tools tab)
const panel=document.getElementById('panel'),pnlToggle=document.getElementById('pnl-toggle');
function resizeCanvas(){const c=document.getElementById('cv');const w=c.clientWidth,h=c.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);composer.setSize(w,h);ssaoPass.setSize(w,h);}
pnlToggle.addEventListener('click',()=>{
  panel.classList.toggle('collapsed');
  pnlToggle.textContent=panel.classList.contains('collapsed')?'▲':'▼';
  setTimeout(resizeCanvas,50);
});

// Change image on selected object
document.getElementById('btn-change-img').addEventListener('click',()=>{document.getElementById('img-edit-file').click();});
document.getElementById('img-edit-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f||!editingObject)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    editingObject.userData.imageSrc=src;
    const tx=new THREE.TextureLoader().load(src);tx.colorSpace='srgb';
    editingObject.material.map=tx;editingObject.material.needsUpdate=true;
    const img=new Image();img.onload=()=>{const a=img.width/img.height;editingObject.geometry.dispose();editingObject.geometry=new THREE.PlaneGeometry(1,a);editingObject.geometry.computeVertexNormals();document.getElementById('img-preview').src=src;};
    img.src=src;
  };
  reader.readAsDataURL(f);
  e.target.value='';
});

// Tab switching
document.querySelectorAll('#panel-tabs button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#panel-tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');
    const tab=b.dataset.tab;
    document.querySelectorAll(`.tab-content[data-tab="${tab}"]`).forEach(x=>x.style.display='');
  });
});

const cp=document.getElementById('cp'),ch=document.getElementById('ch');
cp.addEventListener('input',()=>{const oc=[...selected].map(m=>m.material.color.getHex());const nc=cp.value;nextColor=nc;ch.textContent=nc;if(dropMode&&dropMode.ghost)dropMode.ghost.material.color.set(nc);if(selected.size){const c=new THREE.Color(nc);selected.forEach(m=>m.material.color.copy(c));history.execute(actColor([...selected],oc,nc));refreshPanel();}});
document.querySelectorAll('.cc span').forEach(el=>{el.addEventListener('click',()=>{const c=el.dataset.c;const oc=[...selected].map(m=>m.material.color.getHex());cp.value=c;ch.textContent=c;nextColor=c;if(dropMode&&dropMode.ghost)dropMode.ghost.material.color.set(c);if(selected.size){const col=new THREE.Color(c);selected.forEach(m=>m.material.color.copy(col));history.execute(actColor([...selected],oc,c));refreshPanel();}});});
document.getElementById('bddel').addEventListener('click',delSel);
document.getElementById('btn-del-tl').addEventListener('click',delSel);
document.getElementById('btn-dup-tl').addEventListener('click',dupSel);

// Selection tools
document.getElementById('sel-default').addEventListener('click',()=>{
  selectMode='default';
  document.querySelectorAll('#tl-tools .tl-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sel-default').classList.add('on');
  document.getElementById('sel-overlay').style.display='none';
  rectDragging=false;rectStart=rectEnd=null;
});
// Prevent right-click menu on panel
document.getElementById('panel').addEventListener('contextmenu',e=>e.preventDefault());

document.getElementById('sel-rect').addEventListener('click',()=>{
  selectMode='rect';
  document.querySelectorAll('#tl-tools .tl-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sel-rect').classList.add('on');
  if(dropMode)cancelDropMode();
});
document.getElementById('bdup').addEventListener('click',dupSel);
document.getElementById('bdrst').addEventListener('click',()=>{if(dropMode)cancelDropMode();for(const m of[...objects]){scene.remove(m);m.geometry.dispose();m.material.dispose();}objects.length=0;dropTargets.length=1;selected.clear();detachGizmo();history.undoStack=[];history.redoStack=[];history.updateButtons();refreshSelection();camera.position.set(6,5,8);orbit.target.set(0,.4,0);orbit.update();});

// Grid toggle
document.getElementById('grid-btn').addEventListener('click',()=>{const b=document.getElementById('grid-btn');gridHelper.visible=!gridHelper.visible;b.classList.toggle('on');b.textContent=gridHelper.visible?'🔲 Tampilkan':'🔳 Sembunyikan';});

// Lighting controls
function updateSun(){const h=sunHA*Math.PI/180,v=sunVA*Math.PI/180;const r=12;sun.position.set(r*Math.cos(h)*Math.cos(v),r*Math.sin(v),r*Math.sin(h)*Math.cos(v));}
document.getElementById('light-h').addEventListener('input',e=>{sunHA=parseFloat(e.target.value);updateSun();});
document.getElementById('light-v').addEventListener('input',e=>{sunVA=parseFloat(e.target.value);updateSun();});
document.getElementById('sun-color').addEventListener('input',e=>{sun.color.set(e.target.value);});
document.getElementById('bg-color').addEventListener('input',e=>{scene.background=new THREE.Color(e.target.value);});
document.getElementById('ambient-color').addEventListener('input',e=>{ambient.color.set(e.target.value);});

// Soft shadow toggle
document.getElementById('soft-shadow-btn').addEventListener('click',()=>{
  const b=document.getElementById('soft-shadow-btn');
  const on=b.classList.contains('on');
  document.querySelectorAll('#soft-shadow-btn,#ao-btn').forEach(x=>x.classList.remove('on'));
  if(on){renderer.shadowMap.type=THREE.PCFShadowMap;b.classList.remove('on');}else{b.classList.add('on');renderer.shadowMap.type=THREE.PCFSoftShadowMap;}
});

// AO toggle
document.getElementById('ao-btn').addEventListener('click',()=>{
  const b=document.getElementById('ao-btn');
  b.classList.toggle('on');
  ssaoEnabled=b.classList.contains('on');
  ssaoPass.enabled=ssaoEnabled;
});

// Resize
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);composer.setSize(w,h);ssaoPass.setSize(w,h);});

// Init
(function init(){for(const[t,p,c]of[['box',[-1.5,.5,0],'#e94560'],['sphere',[1.5,.6,0],'#0f3460'],['cylinder',[0,.5,-1.8],'#16a34a'],['cone',[0,.5,1.8],'#f59e0b'],['torus',[-1.8,.5,-1.5],'#8b5cf6']]){nextColor=c;const m=createObj(t);m.position.set(p[0],p[1],p[2]);scene.add(m);objects.push(m);dropTargets.push(m);}nextColor='#e94560';cp.value=nextColor;ch.textContent=nextColor;})();

// Loop
function loop(){requestAnimationFrame(loop);const g=getActiveGizmo();if(g.visible&&targetObject){if(selected.size>1){const c=new THREE.Vector3();for(const m of selected)c.add(m.position);c.divideScalar(selected.size);g.position.copy(c);}else{g.position.copy(targetObject.position);}}orbit.update();composer.render();}
loop();
console.log('✅ Gizmo mode: advanced (thin) + simple. Toggle in toolbar!');
</script>
</body>
