<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Primitive Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a12;
    color: #e0e0e8;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }
  .hero {
    text-align: center;
    padding: 40px 24px 0;
  }
  .hero h1 { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
  .hero h1 span { color: #e94560; }
  .hero p { font-size: 15px; opacity: .5; margin-top: 6px; }
  .cta {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 24px auto 0;
  }
  .cta a {
    padding: 10px 22px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: .12s;
    white-space: nowrap;
  }
  .cta .primary { background: #e94560; color: #fff; }
  .cta .primary:hover { background: #d63851; }
  .cta .secondary { border: 1px solid rgba(255,255,255,.12); color: #bbb; }
  .cta .secondary:hover { border-color: #e94560; color: #fff; background: rgba(233,69,96,.08); }
  .editor-wrap {
    max-width: 960px;
    margin: 28px auto;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.06);
    box-shadow: 0 4px 32px rgba(0,0,0,.5);
  }
  @media (max-width: 600px) {
    .hero h1 { font-size: 26px; }
    .cta a { font-size: 13px; padding: 8px 16px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>🏠 <span>3D</span> Primitive Builder</h1>
  <p>Browser-based 3D scene editor &amp; gallery — made with Three.js</p>
  <div class="cta">
    <a class="primary" href="editor/">🎮 Open Editor</a>
    <a class="secondary" href="https://github.com/igrir/3d-primitive-builder">📦 GitHub</a>
    <a class="secondary" href="embedding/">📖 Embed Docs</a>
    <a class="secondary" href="viewer.html">🏠 Gallery</a>
    <a class="secondary" href="dist/3d-primitive-builder.umd.js">⬇️ Download</a>
  </div>
</div>

<div class="editor-wrap" id="live-editor"></div>

<div class="footer" style="text-align:center;padding:20px 24px 32px;font-size:13px;opacity:.3">
  Built with ❤️ using Three.js &middot;
  <a href="https://github.com/igrir/3d-primitive-builder" style="color:#e94560;text-decoration:none">igrir/3d-primitive-builder</a>
</div>

<script src="dist/3d-primitive-builder.umd.js"></script>
<script>
  PrimitiveBuilder.create('#live-editor', { height: 480 }).init();
</script>

</body>
</html>
