<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Primitive Builder — Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  #editor { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="../dist/3d-primitive-builder.umd.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const viewScene = params.get('view');
  const scenes = {
    chair: [
      { type:'box', pos:[0,0.4,0], scl:[0.8,0.1,0.8], color:'#8B4513' },
      { type:'box', pos:[0,0.75,-0.35], scl:[0.8,0.5,0.08], color:'#8B4513' },
      { type:'cylinder', pos:[-0.35,0.15,-0.35], scl:[0.06,0.3,0.06], color:'#5C3A1E' },
      { type:'cylinder', pos:[0.35,0.15,-0.35], scl:[0.06,0.3,0.06], color:'#5C3A1E' },
      { type:'cylinder', pos:[-0.35,0.15,0.35], scl:[0.06,0.3,0.06], color:'#5C3A1E' },
      { type:'cylinder', pos:[0.35,0.15,0.35], scl:[0.06,0.3,0.06], color:'#5C3A1E' },
    ],
    ball: [
      { type:'sphere', pos:[0,0.6,0], scl:[1,1,1], color:'#FF6B35' },
      { type:'torus', pos:[0,0.6,0], scl:[0.6,0.05,0.6], color:'#FFFFFF' },
    ],
    tree: [
      { type:'cylinder', pos:[0,0.5,0], scl:[0.12,1,0.12], color:'#6B4226' },
      { type:'cone', pos:[0,1.3,0], scl:[0.8,0.4,0.8], color:'#2D8A2D' },
      { type:'cone', pos:[0,1.7,0], scl:[0.65,0.35,0.65], color:'#3AA33A' },
      { type:'cone', pos:[0,2.1,0], scl:[0.5,0.3,0.5], color:'#4CBB4C' },
      { type:'cone', pos:[0,2.45,0], scl:[0.3,0.25,0.3], color:'#5FD35F' },
    ],
  };

  const sceneData = scenes[viewScene];
  if (sceneData) {
    document.body.classList.add('view-mode-pure');
    const ed = PrimitiveBuilder.create('#editor', {
      height: window.innerHeight, showUI: false,
    });
    ed.init();
    setTimeout(() => {
      ed.loadScene(sceneData);
      setTimeout(() => {
        const sr = PrimitiveBuilder.sceneRefs;
        if (sr) {
          // Pure viewer: no selection, no gizmo, lightweight rendering
          sr.viewerMode = true;
          sr.selected && sr.selected.clear();
          const gizmo = sr.advGizmo || sr.simGizmo;
          if (gizmo) gizmo.visible = false;
          if (sr.camera && sr.orbit) {
            sr.camera.position.set(3, 2.5, 3.5);
            sr.orbit.target.set(0, 1, 0);
            sr.orbit.update();
          }
        }
      }, 50);
    }, 50);
  } else {
    PrimitiveBuilder.create('#editor', { height: window.innerHeight }).init();
  }
</script>
</body>
</html>
